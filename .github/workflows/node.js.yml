name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # Proses untuk Backend
    - name: Install and Build Backend
      run: |
        cd Backend
        npm ci
        npm run build --if-present

    # Proses untuk Frontend
    - name: Install and Build Frontend
      run: |
        cd Frontend
        npm ci
        npm run build --if-present

    # Catatan: npm test akan dijalankan di root.
    # Jika kamu ingin test Backend dan Frontend dipisah,
    # ganti baris di bawah dengan perintah cd ke masing-masing folder.
    - name: Run Tests
      run: |
        # Contoh menjalankan test di masing-masing folder
        cd Backend && npm test || echo "Backend tests skipped"
        cd ../Frontend && npm test || echo "Frontend tests skipped"
