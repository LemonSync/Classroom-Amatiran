name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # Proses untuk Backend
    - name: Install and Build Backend
      run: |
        cd Backend
        npm install --include=optional
        npm run build --if-present

    # Proses untuk Frontend
    - name: Install and Build Frontend
      run: |
        cd Frontend
        # 1. Hapus cache lokal npm di runner
        npm cache clean --force
        # 2. Hapus modul yang mungkin rusak
        rm -rf node_modules
        # 3. Instal semua, termasuk optional deps secara paksa
        npm install --prefer-online --force
        # 4. Build
        npm run build --if-present

    # Run Tests dengan navigasi yang aman
    - name: Run Tests
      run: |
        if [ -d "Backend" ]; then echo "Running Backend tests..."; cd Backend && npm test; fi

        cd ..

        if [ -d "Frontend" ]; then echo "Running Frontend tests..."; cd Frontend && npm test; fi
